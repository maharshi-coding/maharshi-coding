<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Maharshi Barot AI systems profile banner</title>
  <desc id="desc">A futuristic engineering console showing AI, mobile, backend, and data systems around Maharshi Barot.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08111F"/>
      <stop offset="0.44" stop-color="#0D1B2A"/>
      <stop offset="0.73" stop-color="#123524"/>
      <stop offset="1" stop-color="#1F1308"/>
    </linearGradient>
    <linearGradient id="core" x1="390" y1="70" x2="820" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="0.34" stop-color="#A78BFA"/>
      <stop offset="0.66" stop-color="#34D399"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(605 210) rotate(90) scale(220 390)">
      <stop offset="0" stop-color="#67E8F9" stop-opacity="0.52"/>
      <stop offset="0.45" stop-color="#7C3AED" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.27 0 0 0 0 0.88 0 0 0 0 1 0 0 0 0.75 0" result="colored"/>
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
      .tiny { font-size: 16px; letter-spacing: 1.8px; }
      .label { font-size: 18px; }
      .pill { font-size: 15px; letter-spacing: 1px; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; transform-origin: center; }
      .pulse2 { animation: pulse 2.4s ease-in-out infinite .65s; transform-origin: center; }
      .dash { stroke-dasharray: 9 12; animation: travel 8s linear infinite; }
      @keyframes pulse { 0%, 100% { opacity: .42; transform: scale(1); } 50% { opacity: 1; transform: scale(1.035); } }
      @keyframes travel { to { stroke-dashoffset: -240; } }
    </style>
  </defs>

  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="418" rx="33" stroke="#E5E7EB" stroke-opacity="0.12"/>
  <rect width="1200" height="420" rx="34" fill="url(#grid)"/>
  <rect width="1200" height="420" rx="34" fill="url(#glow)"/>

  <g opacity="0.78">
    <path class="dash" d="M102 312 C260 246 312 148 454 186 C548 211 531 286 626 288 C729 291 754 151 873 142 C976 134 1025 218 1098 88" stroke="#67E8F9" stroke-opacity="0.34" stroke-width="2"/>
    <path class="dash" d="M92 126 C230 178 298 280 428 243 C558 206 565 88 684 100 C805 112 814 269 934 286 C1028 299 1071 252 1114 223" stroke="#FBBF24" stroke-opacity="0.28" stroke-width="2"/>
  </g>

  <g transform="translate(78 62)">
    <text class="mono tiny" fill="#93C5FD">PROFILE_BOOT_SEQUENCE / 2026</text>
    <text class="sans" x="0" y="68" fill="#F8FAFC" font-size="48" font-weight="800">Maharshi Barot</text>
    <text class="sans" x="0" y="107" fill="#CBD5E1" font-size="24" font-weight="500">AI product engineer building mobile apps, LLM workflows, APIs, and real-time systems.</text>
    <g transform="translate(0 145)">
      <rect width="188" height="38" rx="19" fill="#0F172A" stroke="#38BDF8" stroke-opacity="0.45"/>
      <text class="mono pill" x="20" y="25" fill="#BAE6FD">React Native</text>
      <rect x="202" width="136" height="38" rx="19" fill="#0F172A" stroke="#34D399" stroke-opacity="0.45"/>
      <text class="mono pill" x="222" y="25" fill="#BBF7D0">Firebase</text>
      <rect x="352" width="164" height="38" rx="19" fill="#0F172A" stroke="#A78BFA" stroke-opacity="0.45"/>
      <text class="mono pill" x="372" y="25" fill="#DDD6FE">OpenAI APIs</text>
      <rect x="530" width="142" height="38" rx="19" fill="#0F172A" stroke="#F59E0B" stroke-opacity="0.45"/>
      <text class="mono pill" x="550" y="25" fill="#FED7AA">FastAPI</text>
    </g>
  </g>

  <g transform="translate(470 94)" filter="url(#softGlow)">
    <circle cx="136" cy="116" r="96" stroke="url(#core)" stroke-width="3" opacity="0.92"/>
    <circle class="pulse" cx="136" cy="116" r="74" stroke="#67E8F9" stroke-opacity="0.45" stroke-width="2"/>
    <circle class="pulse2" cx="136" cy="116" r="48" stroke="#34D399" stroke-opacity="0.55" stroke-width="2"/>
    <path d="M136 36 L176 93 L246 116 L176 139 L136 196 L96 139 L26 116 L96 93 Z" stroke="#E0F2FE" stroke-opacity="0.82" stroke-width="2" fill="#020617" fill-opacity="0.34"/>
    <circle cx="136" cy="116" r="15" fill="#F8FAFC"/>
    <circle cx="136" cy="116" r="7" fill="#22D3EE"/>
    <path d="M136 36V12M246 116H272M136 196V220M26 116H0" stroke="#E2E8F0" stroke-opacity="0.5" stroke-width="2"/>
  </g>

  <g class="mono" font-size="15" fill="#E5E7EB">
    <g transform="translate(842 72)">
      <rect width="282" height="52" rx="15" fill="#020617" fill-opacity="0.66" stroke="#38BDF8" stroke-opacity="0.25"/>
      <circle cx="27" cy="26" r="7" fill="#38BDF8"/>
      <text x="48" y="31">LLM EVAL LOOPS</text>
    </g>
    <g transform="translate(842 142)">
      <rect width="282" height="52" rx="15" fill="#020617" fill-opacity="0.66" stroke="#34D399" stroke-opacity="0.25"/>
      <circle cx="27" cy="26" r="7" fill="#34D399"/>
      <text x="48" y="31">REAL-TIME FIREBASE</text>
    </g>
    <g transform="translate(842 212)">
      <rect width="282" height="52" rx="15" fill="#020617" fill-opacity="0.66" stroke="#F59E0B" stroke-opacity="0.25"/>
      <circle cx="27" cy="26" r="7" fill="#F59E0B"/>
      <text x="48" y="31">ROUTE-AWARE MOBILE</text>
    </g>
    <g transform="translate(842 282)">
      <rect width="282" height="52" rx="15" fill="#020617" fill-opacity="0.66" stroke="#A78BFA" stroke-opacity="0.25"/>
      <circle cx="27" cy="26" r="7" fill="#A78BFA"/>
      <text x="48" y="31">FASTAPI / DJANGO / .NET</text>
    </g>
  </g>

  <g class="mono" font-size="13" fill="#94A3B8" opacity="0.92">
    <text x="80" y="356">INPUT: rough idea</text>
    <text x="282" y="356">PROCESS: prototype - evaluate - document</text>
    <text x="642" y="356">OUTPUT: usable system</text>
    <text x="918" y="356">STATUS: building</text>
  </g>
</svg>
