<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MaharshiOS builder runtime panel</title>
  <desc id="desc">A custom operating-system themed diagram for Maharshi Barot's AI product engineering profile.</desc>
  <defs>
    <linearGradient id="panelBg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="0.36" stop-color="#081F2D"/>
      <stop offset="0.7" stop-color="#12251D"/>
      <stop offset="1" stop-color="#2A1608"/>
    </linearGradient>
    <linearGradient id="wire" x1="128" y1="257" x2="1050" y2="257" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.32" stop-color="#A78BFA"/>
      <stop offset="0.68" stop-color="#34D399"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 258) rotate(90) scale(244 482)">
      <stop stop-color="#22D3EE" stop-opacity="0.36"/>
      <stop offset="0.58" stop-color="#7C3AED" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="mesh" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#FFFFFF" stroke-opacity="0.05"/>
      <circle cx="0" cy="0" r="1.4" fill="#FFFFFF" fill-opacity="0.12"/>
    </pattern>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.83 0 0 0 0 1 0 0 0 0.7 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; }
      .small { font-size: 14px; letter-spacing: 1.2px; }
      .mid { font-size: 18px; }
      .scan { animation: scan 4.5s ease-in-out infinite; }
      .blink { animation: blink 1.8s steps(2, start) infinite; }
      .flow { stroke-dasharray: 16 18; animation: flow 10s linear infinite; }
      .float { animation: float 5.5s ease-in-out infinite; }
      .float2 { animation: float 5.5s ease-in-out infinite 1.1s; }
      @keyframes scan { 0%,100% { transform: translateY(-15px); opacity: .18; } 50% { transform: translateY(310px); opacity: .55; } }
      @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: .25; } }
      @keyframes flow { to { stroke-dashoffset: -340; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
    </style>
  </defs>

  <rect width="1200" height="520" rx="30" fill="url(#panelBg)"/>
  <rect width="1200" height="520" rx="30" fill="url(#mesh)"/>
  <rect width="1200" height="520" rx="30" fill="url(#orb)"/>
  <rect x="1" y="1" width="1198" height="518" rx="29" stroke="#E2E8F0" stroke-opacity="0.14"/>

  <g class="scan">
    <rect x="40" y="76" width="1120" height="30" fill="#67E8F9" fill-opacity="0.06"/>
  </g>

  <g transform="translate(58 42)">
    <circle cx="14" cy="14" r="7" fill="#F87171"/>
    <circle cx="38" cy="14" r="7" fill="#FBBF24"/>
    <circle cx="62" cy="14" r="7" fill="#34D399"/>
    <text class="mono small" x="94" y="20" fill="#94A3B8">/usr/local/maharshi-os/runtime</text>
  </g>

  <g transform="translate(72 92)">
    <text class="sans" x="0" y="0" fill="#F8FAFC" font-size="42" font-weight="800">MaharshiOS</text>
    <text class="mono" x="0" y="35" fill="#93C5FD" font-size="17">builder runtime for AI products, mobile systems, APIs, and applied ML</text>
  </g>

  <g transform="translate(798 82)" class="mono" font-size="14">
    <rect width="322" height="95" rx="18" fill="#020617" fill-opacity="0.64" stroke="#38BDF8" stroke-opacity="0.28"/>
    <text x="24" y="30" fill="#BAE6FD">status: compiling ambition</text>
    <text x="24" y="56" fill="#CBD5E1">latency: low between idea and prototype</text>
    <text x="24" y="82" fill="#CBD5E1">interface: human-readable</text>
    <rect class="blink" x="285" y="22" width="12" height="12" rx="3" fill="#34D399"/>
  </g>

  <path class="flow" d="M132 258 C250 210 316 303 428 258 C548 210 646 306 768 258 C886 211 956 303 1068 258" stroke="url(#wire)" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>

  <g class="sans" font-weight="700">
    <g class="float" transform="translate(88 210)">
      <rect width="190" height="102" rx="22" fill="#08111F" stroke="#38BDF8" stroke-opacity="0.45"/>
      <text x="26" y="38" fill="#E0F2FE" font-size="22">Idea Kernel</text>
      <text class="mono" x="26" y="68" fill="#94A3B8" font-size="14">unclear need</text>
      <text class="mono" x="26" y="88" fill="#94A3B8" font-size="14">real constraint</text>
    </g>
    <g class="float2" transform="translate(341 210)">
      <rect width="190" height="102" rx="22" fill="#0D1024" stroke="#A78BFA" stroke-opacity="0.45"/>
      <text x="26" y="38" fill="#EDE9FE" font-size="22">AI Engine</text>
      <text class="mono" x="26" y="68" fill="#C4B5FD" font-size="14">LLM + eval</text>
      <text class="mono" x="26" y="88" fill="#C4B5FD" font-size="14">prompt loops</text>
    </g>
    <g class="float" transform="translate(594 210)">
      <rect width="190" height="102" rx="22" fill="#061B18" stroke="#34D399" stroke-opacity="0.45"/>
      <text x="26" y="38" fill="#D1FAE5" font-size="22">Product Shell</text>
      <text class="mono" x="26" y="68" fill="#A7F3D0" font-size="14">mobile + web</text>
      <text class="mono" x="26" y="88" fill="#A7F3D0" font-size="14">UX that works</text>
    </g>
    <g class="float2" transform="translate(847 210)">
      <rect width="220" height="102" rx="22" fill="#211405" stroke="#F59E0B" stroke-opacity="0.45"/>
      <text x="26" y="38" fill="#FFEDD5" font-size="22">Reality Drivers</text>
      <text class="mono" x="26" y="68" fill="#FED7AA" font-size="14">APIs + DB + auth</text>
      <text class="mono" x="26" y="88" fill="#FED7AA" font-size="14">maps + payments</text>
    </g>
  </g>

  <g transform="translate(76 370)" class="mono" font-size="15">
    <rect width="1048" height="88" rx="18" fill="#020617" fill-opacity="0.72" stroke="#E2E8F0" stroke-opacity="0.1"/>
    <text x="28" y="32" fill="#67E8F9">compile --from resume --target github-profile --style impossible-but-readable</text>
    <text x="28" y="58" fill="#CBD5E1">modules loaded: react-native firebase openai fastapi django .net mapbox stripe opencv postgres mongodb docker</text>
    <text x="28" y="78" fill="#94A3B8">rule: if it cannot be explained, it is not finished</text>
  </g>

  <g opacity="0.45" stroke="#E2E8F0">
    <path d="M182 210V172H332"/>
    <path d="M436 210V178H588"/>
    <path d="M688 210V172H806"/>
    <path d="M956 210V184H1068"/>
  </g>
</svg>
